<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MEDTEX - Cari Dokter</title>
<style>
*{ margin:0; padding:0; 
  box-sizing:border-box; 
  font-family:Arial,sans-serif; }
body{ background:#f5f7f6; }

.navbar{ 
  height:70px; 
  background:white; 
  display:flex; 
  justify-content:space-between; 
  align-items:center; padding:0 40px; 
  box-shadow:0 2px 8px rgba(0,0,0,0.05); 
}
.logo{ 
  font-size:24px; 
  font-weight:bold; 
  color:#1dbf73; 
}
.user{ 
  font-size:15px; 
  color:#555; 
}

.container{ 
  display:flex; 
}

.sidebar{ 
  width:240px; 
  height:calc(100vh - 70px); 
  background:white; 
  padding:25px; 
  box-shadow:2px 0 5px rgba(0,0,0,0.03); 
}
.menu{ 
  padding:14px; 
  border-radius:10px; 
  margin-bottom:12px; 
  cursor:pointer; 
  transition:0.3s; 
  color:#555; 
}
.menu:hover{ 
  background:#1dbf73; 
  color:white; 
}
.active{ 
  background:#1dbf73; 
  color:white; 
}

.main{ 
  flex:1; 
  padding:35px; 
  overflow-y:auto; 
  height:calc(100vh - 70px); 
}

.search-box{ 
  background:white; 
  padding:30px; 
  border-radius:15px; 
  margin-bottom:30px; 
  box-shadow:0 2px 5px rgba(0,0,0,0.05); 
}
.search-title{ 
  font-size:28px; 
  font-weight:bold; 
  margin-bottom:20px; 
}
.search-input{ 
  width:100%; 
  padding:14px; 
  border:1px solid #ddd; 
  border-radius:10px; 
  margin-bottom:20px; 
  font-size:15px; 
  outline:none; 
}
.search-input:focus{ 
  border-color:#1dbf73; 
}
.filter-row{ 
  display:flex; 
  gap:15px; 
}
.select{ 
  flex:1; 
  padding:13px; 
  border-radius:10px; 
  border:1px solid #ddd; 
  font-size:14px; 
}
.btn{ 
  background:#1dbf73; 
  color:white; 
  border:none; 
  padding:13px 25px; 
  border-radius:10px; 
  cursor:pointer; 
  font-size:14px; 
  transition:0.3s; 
}
.btn:hover{ 
  background:#18a966; 
}

.section-title{ 
  font-size:20px; 
  margin-bottom:20px; 
  margin-top:15px;
  font-weight:900;
}
.doctor-list{ 
  display:grid; 
  grid-template-columns:repeat(3,1fr);
  gap:25px; 
}
.doctor-card{ 
  background:white; 
  padding:25px; 
  border-radius:15px; 
  text-align:center; 
  box-shadow:0 2px 8px rgba(0,0,0,0.05); 
  transition:0.3s; 
}
.doctor-card:hover{ 
  transform:translateY(-5px); 
}
.doc-avatar{ 
  width:90px; 
  height:90px; 
  border-radius:50%; 
  background:#e8f8f1; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  font-size:32px; 
  font-weight:bold; 
  color:#1dbf73; 
  margin:0 auto 15px;
}
.doctor-name{ 
  font-size:20px; 
  font-weight:bold; 
}
.specialist{ 
  color:#666;
 margin:10px 0; 
}
.price{ 
  color:#1dbf73; 
  font-weight:bold; 
  margin-bottom:15px; 
}
.no-result{ 
  text-align:center; 
  color:#aaa; 
  padding:40px; 
  grid-column:1/-1; 
}

/* MODAL */
.overlay{ 
  display:none; 
  position:fixed; 
  inset:0; 
  background:rgba(0,0,0,0.4); 
  align-items:center; 
  justify-content:center; 
  z-index:100; 
}
.overlay.show{ 
  display:flex; 
}
.modal{ 
  background:white; 
  border-radius:15px; 
  padding:35px; 
  width:480px; 
  max-width:90%; 
  position:relative; 
}
.modal-close{ 
  position:absolute; 
  top:15px; 
  right:20px; 
  font-size:22px; 
  cursor:pointer; 
  color:#aaa; 
  background:none; 
  border:none; 
}
.modal-close:hover{ 
  color:#333; 
}
.modal-avatar{ 
  width:80px;
  height:80px; 
  border-radius:50%; 
  background:#e8f8f1; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  font-size:28px; 
  font-weight:bold; 
  color:#1dbf73; 
  margin:0 auto 15px; 
}
.modal-name{ 
  font-size:22px ; 
  font-weight:bold; 
  text-align:center; 
}
.modal-spec{ 
  text-align:center; 
  color:#888;
  margin-bottom:20px; 
}
.info-row{ 
  display:flex; 
  justify-content:space-between; 
  padding:10px 0; 
  border-bottom:1px solid #f0f0f0; 
  font-size:14px; 
}
.info-row span:first-child{ 
  color:#888; 
}
.info-row span:last-child{ 
  font-weight:bold; 
  color:#333; 
}
.modal-price{ 
  text-align:center; 
  font-size:20px; 
  font-weight:bold; 
  color:#1dbf73; 
  margin:18px 0; 
}
.modal-actions{ 
  display:flex; 
  gap:12px; 
  margin-top:5px; 
}
.btn-outline{ 
  flex:1; 
  padding:12px; 
  border-radius:10px; 
  border:2px solid #1dbf73; 
  background:white; 
  color:#1dbf73; 
  font-size:14px; 
  cursor:pointer; 
  transition:0.3s; 
}
.btn-outline:hover{ 
  background:#e8f8f1; 
}
.modal-actions .btn{ 
  flex:1; padding:12px; 
}

.booking-modal{ 
  background:white; 
  border-radius:15px; 
  padding:35px; 
  width:460px; 
  max-width:90%; 
  position:relative; 
}
.form-group{ 
  margin-bottom:18px; 
}
.form-group label{ 
  display:block; 
  font-size:14px; 
  color:#555; 
  margin-bottom:7px; 
}
.form-group .input, .form-group .select{ 
  width:100%; 
  padding:12px; 
  border:1px solid #ddd; 
  border-radius:10px; 
  font-size:14px; 
  outline:none; 
}
.form-group .input:focus, .form-group .select:focus{ 
  border-color:#1dbf73; 
}
.slot-list{ 
  display:flex; 
  flex-wrap:wrap; 
  gap:8px; 
  margin-top:5px; 
}
.slot{ 
  padding:9px 16px; 
  border:1px solid #ddd; 
  border-radius:10px; 
  font-size:13px; 
  cursor:pointer; 
  transition:0.2s; 
}
.slot:hover{ 
  border-color:#1dbf73; 
  color:#1dbf73; 
}
.slot.aktif{ 
  background:#1dbf73; 
  color:white; 
  border-color:#1dbf73; 
}

/* SUKSES */
.sukses-modal{ 
  background:white;
 border-radius:15px; 
 padding:40px; 
 width:380px; 
 text-align:center; 
}
.sukses-icon{ 
  font-size:52px; 
  margin-bottom:15px; 
}
.sukses-modal h3{ 
  font-size:20px; 
  margin-bottom:8px; 
}
.sukses-modal p{ 
  color:#666; 
  margin-bottom:20px; 
  font-size:14px; }
#pfp{
      width:20px;
      height:20px;
    }
    .icon-caridokter{
      width:35;
      height:35px;
      padding-left:10px;
    }
    .icon-dashboard{
      width:35;
      height:35px;
      padding-left:10px;
    }
    .icon-booking{
      width:35;
      height:35px;
      padding-left:10px;
    }
    .icon-chat{
      width:35;
      height:35px;
      padding-left:10px;
    }
    .icon-riwayat{
      width:35;
      height:35px;
      padding-left:10px;
    }
    .icon-fasilitas{
      width:35;
      height:35px;
      padding-left:10px;
    }
    .icon-checker{
      width:30;
      height:30px;
      padding-left:10px;
    }
    #filter-spesialis{
      color:#666;
    }
    #filter-lokasi{
      color:#666;
    }
    .icon-chat2,.icon-booking2{
      width:20px;
      height:20px;
      margin-left:5px;
    }
    #sidebar-text{
      color:black;
      text-decoration:none;
    }
    .link1{
      text-decoration:none;
      color:black;
    }
    .link2{
      text-decoration:none;
      color:white;
    }
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">MEDTEX</div>
  <div><img src="profile-icon-9.png" alt="pfp" id="pfp">User</div>
</div>

<div class="container">

<div class="sidebar">
    <div class="menu"><a href="main_page.html" id="sidebar-text">Dashboard<img src="dashboard.png" alt="Dashboard" class="icon-dashboard"></a></div>
    <div class="menu active"><a href="#" id="sidebar-text">Cari Dokter <img src="magnifying_glass.png" alt="caridokter" class="icon-caridokter"></a></div>
    <div class="menu"><a href="booking.html" id="sidebar-text">Booking<img src="booking.png" alt="booking" class="icon-booking"></a></div>
    <div class="menu"><a href="chat.html" id="sidebar-text">Chat<img src="chat.png" alt="chat" class="icon-chat"></a></div>
    <div class="menu"><a href="Riwayat.html" id="sidebar-text">Riwayat<img src="riwayat.png" alt="riwayat" class="icon-riwayat"></a></div>
    <div class="menu"><a href="fasilitas.html" id="sidebar-text">Fasilitas<img src="fasilitas.png" alt="fasilitas" class="icon-fasilitas"></a></div>
    <div class="menu"><a href="symptom checker.html" id="sidebar-text">symptom checker<img src="checker.png" alt="symptom" class="icon-checker"></a></div>
    <div class="menu"><a href="bantuan.html" id="sidebar-text">Bantuan<img src="question-mark.png" alt="symptom" class="icon-checker"></a></div>

  </div>

  <div class="main">

    <div class="search-box">
      <div class="search-title">Cari Dokter</div>
      <input type="text" class="search-input" id="search" placeholder="Cari nama dokter..." onkeydown="if(event.key==='Enter') cariDokter()">
      <div class="filter-row">
        <select class="select" id="filter-spesialis">
          <option value="">Semua Spesialis</option>
          <option>Dokter Anak</option>
          <option>Dermatologist</option>
          <option>Penyakit Dalam</option>
          <option>Dokter Umum</option>
        </select>
        <select class="select" id="filter-lokasi">
          <option value="">Semua Lokasi</option>
          <option>Jakarta</option>
          <option>Bandung</option>
          <option>Bogor</option>
        </select>
        <button class="btn" onclick="cariDokter()">Cari</button>
      </div>
    </div>

    <div id="hasil-section" style="display:none;">
      <div class="section-title">Hasil Pencarian</div>
      <div class="doctor-list" id="hasil-list"></div>
    </div>

    <div class="section-title">Daftar Dokter</div>
    <div class="doctor-list" id="doctor-list"></div>

  </div>
</div>

<div class="overlay" id="overlay-detail">
  <div class="modal">
    <button class="modal-close" onclick="tutup('overlay-detail')">✕</button>
    <div class="modal-avatar" id="d-avatar"></div>
    <div class="modal-name" id="d-nama"></div>
    <div class="modal-spec" id="d-spesialis"></div>
    <div class="info-row"><span>Lokasi</span><span id="d-lokasi"></span></div>
    <div class="info-row"><span>Pengalaman</span><span id="d-exp"></span></div>
    <div class="info-row"><span>Rating</span><span id="d-rating"></span></div>
    <div class="info-row"><span>Jadwal</span><span id="d-jadwal"></span></div>
    <div class="modal-price" id="d-harga"></div>
    <div class="modal-actions">
      <button class="btn-outline"><a href="chat.html" class="link1">Chat<img src="chat.png" alt="chat" class="icon-chat2"></a></button>
      <button class="btn" ><a href="booking.html" class="link2">Booking<img src="booking.png" alt="booking" class="icon-booking2"></a></button>
    </div>
  </div>
</div>



<script>
const dokterData = [
  { nama:"dr. Dinda", spesialis:"Dermatologist", lokasi:"Jakarta", exp:"5 tahun", rating:"4.9", jadwal:"Sen–Jum, 08:00–16:00", harga:"Rp150.000", inisial:"D" },
  { nama:"dr. Budi",  spesialis:"Penyakit Dalam", lokasi:"Bandung", exp:"8 tahun", rating:"4.8", jadwal:"Sen–Sab, 09:00–17:00", harga:"Rp120.000", inisial:"B" },
  { nama:"dr. Tono",  spesialis:"Dokter Anak",    lokasi:"Bogor",   exp:"6 tahun", rating:"4.7", jadwal:"Sel–Sab, 08:00–15:00", harga:"Rp130.000", inisial:"T" },
  { nama:"dr. Sari",  spesialis:"Dokter Umum",    lokasi:"Jakarta", exp:"3 tahun", rating:"4.6", jadwal:"Sen–Jum, 10:00–18:00", harga:"Rp100.000", inisial:"S" },
  { nama:"dr. Rina",  spesialis:"Dermatologist",  lokasi:"Bandung", exp:"7 tahun", rating:"4.9", jadwal:"Sen–Jum, 08:00–14:00", harga:"Rp160.000", inisial:"R" },
  { nama:"dr. Hendra",spesialis:"Penyakit Dalam", lokasi:"Jakarta", exp:"10 tahun",rating:"5.0", jadwal:"Sen–Sab, 08:00–16:00", harga:"Rp175.000", inisial:"H" },
];

let dokterAktif = null;

function renderDokter(list) {
  const el = document.getElementById('doctor-list');
  if (!list.length) { el.innerHTML = '<div class="no-result">Dokter tidak ditemukan.</div>'; return; }
  el.innerHTML = list.map((d,i) => `
    <div class="doctor-card">
      <div class="doc-avatar">${d.inisial}</div>
      <div class="doctor-name">${d.nama}</div>
      <div class="specialist">${d.spesialis}</div>
      <div class="price">${d.harga}</div>
      <button class="btn" onclick="bukaDetail(${dokterData.indexOf(d)})">Detail</button>
    </div>
  `).join('');
}

function cariDokter() {
  const q = document.getElementById('search').value.toLowerCase();
  const sp = document.getElementById('filter-spesialis').value;
  const lok = document.getElementById('filter-lokasi').value;
  const hasil = dokterData.filter(d =>
    d.nama.toLowerCase().includes(q) &&
    (!sp || d.spesialis === sp) &&
    (!lok || d.lokasi === lok)
  );
  const sec = document.getElementById('hasil-section');
  const list = document.getElementById('hasil-list');
  if (!q && !sp && !lok) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  if (!hasil.length) { list.innerHTML = '<div class="no-result">Dokter tidak ditemukan.</div>'; return; }
  list.innerHTML = hasil.map(d => `
    <div class="doctor-card">
      <div class="doc-avatar">${d.inisial}</div>
      <div class="doctor-name">${d.nama}</div>
      <div class="specialist">${d.spesialis}</div>
      <div class="price">${d.harga}</div>
      <button class="btn" onclick="bukaDetail(${dokterData.indexOf(d)})">Detail</button>
    </div>
  `).join('');
}

function bukaDetail(i) {
  dokterAktif = dokterData[i];
  const d = dokterAktif;
  document.getElementById('d-avatar').textContent = d.inisial;
  document.getElementById('d-nama').textContent = d.nama;
  document.getElementById('d-spesialis').textContent = d.spesialis;
  document.getElementById('d-lokasi').textContent = d.lokasi;
  document.getElementById('d-exp').textContent = d.exp;
  document.getElementById('d-rating').textContent = d.rating;
  document.getElementById('d-jadwal').textContent = d.jadwal;
  document.getElementById('d-harga').textContent = d.harga;
  buka('overlay-detail');
}



function buka(id) { document.getElementById(id).classList.add('show'); }
function tutup(id) { document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target === o) o.classList.remove('show'); });
});

renderDokter(dokterData);
</script>

</body>
</html>
